name: log-niizaki-water-level

on:
  schedule:
    - cron: "0 * * * *"      # 毎時0分（UTC）に実行 ＝ 1時間ごと
  workflow_dispatch:           # 「Run workflow」ボタンで手動実行も可能

permissions:
  contents: write              # CSVをコミットするために必要

concurrency:
  group: niizaki-logger
  cancel-in-progress: false

jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch and log water level
        run: python niizaki_logger.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No new data."
          else
            git commit -m "log: 新崎川水位 $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
